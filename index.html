<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>✨ 8/3 — Tìm tên của bạn!</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;overflow-x:hidden;}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0a0612;}

/* ════════════════════════════════════════════════
   PAGE 1 — INTRO
════════════════════════════════════════════════ */

/* Petals falling */
.petal{position:absolute;pointer-events:none;font-size:18px;
  animation:petalFall linear infinite;opacity:.7;}
@keyframes petalFall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:.8;}
  100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

/* Envelope */
.env-wrap{
  position:relative;width:min(260px,70vw);
  animation:envFloat 3s ease-in-out infinite;
  cursor:pointer;margin-bottom:24px;
}
@keyframes envFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

.envelope{
  width:100%;aspect-ratio:3/2;
  background:linear-gradient(135deg,#e8405a,#c0294a);
  border-radius:8px;
  position:relative;overflow:visible;
  box-shadow:0 8px 32px rgba(200,40,80,.4);
}
.envelope::before{/* flap */
  content:'';position:absolute;top:0;left:0;right:0;
  height:55%;
  background:linear-gradient(135deg,#f06070,#d8304e);
  clip-path:polygon(0 0,100% 0,50% 100%);
  border-radius:8px 8px 0 0;
  transform-origin:top;
  transition:transform .6s ease;
  z-index:2;
}
.env-wrap.open .envelope::before{transform:rotateX(-180deg);}
.env-card{
  position:absolute;inset:8%;
  background:#fffafc;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Pacifico',cursive;font-size:clamp(11px,3vw,16px);
  color:#c0294a;text-align:center;line-height:1.4;
  z-index:1;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  padding:8px;
}
.env-hearts{
  position:absolute;top:-20px;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:3;
}
.env-heart{
  font-size:16px;
  animation:heartPop 1.2s ease-in-out infinite;
}
.env-heart:nth-child(2){animation-delay:.2s;}
.env-heart:nth-child(3){animation-delay:.4s;}
@keyframes heartPop{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

/* Letter */
#letter-box{
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:28px 28px 24px;
  max-width:520px;width:100%;
  box-shadow:0 8px 40px rgba(200,60,100,.2);
  border:1px solid rgba(255,255,255,.6);
  text-align:center;
  display:none;
  animation:letterAppear .6s ease;
}
@keyframes letterAppear{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
#letter-box .lt-header{
  font-family:'Dancing Script',cursive;
  font-size:clamp(28px,6vw,40px);
  color:#c0294a;font-weight:700;margin-bottom:12px;
}
#letter-box .lt-body{
  font-size:clamp(13px,2.5vw,15px);
  color:#5a2030;line-height:1.8;text-align:left;
}
#letter-box .lt-sign{
  margin-top:16px;
  font-family:'Dancing Script',cursive;
  font-size:18px;color:#c0294a;text-align:right;
}

/* CTA Button */
.btn-next{
  margin-top:20px;
  padding:14px 36px;
  background:linear-gradient(135deg,#e8405a,#ff7090);
  border:none;border-radius:99px;
  color:#fff;font-size:16px;
  font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:.5px;
  box-shadow:0 4px 20px rgba(220,60,90,.5);
  transition:transform .2s,box-shadow .2s;
  animation:btnPulse 2s ease-in-out infinite;
}
.btn-next:hover{transform:scale(1.06);}
@keyframes btnPulse{0%,100%{box-shadow:0 4px 20px rgba(220,60,90,.5);}50%{box-shadow:0 4px 32px rgba(220,60,90,.8);}}
.btn-tap{
  padding:12px 28px;
  background:linear-gradient(135deg,#e8405a,#ff7090);
  border:none;border-radius:99px;
  color:#fff;font-size:14px;font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
  cursor:pointer;box-shadow:0 4px 16px rgba(220,60,90,.4);
  transition:transform .2s;display:none;
}
.btn-tap:hover{transform:scale(1.05);}

/* ════════════════════════════════════════════════
   PAGE 2 — WALL
════════════════════════════════════════════════ */
#page-wall{
  display:none;
  min-height:100vh;
  position:relative;
}

/* Background */
#page-wall::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    /* sunset sky gradient */
    linear-gradient(180deg,
      #b06090 0%,
      #d4708a 15%,
      #e89060 30%,
      #f0a855 45%,
      #e8906a 60%,
      #d07888 75%,
      #c06888 100%
    );
}
/* Decorative overlay for depth */
#page-wall::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 10% 90%,rgba(180,40,80,.35) 0%,transparent 40%),
    radial-gradient(ellipse at 90% 85%,rgba(160,60,40,.3) 0%,transparent 40%),
    radial-gradient(ellipse at 50% 110%,rgba(80,20,40,.4) 0%,transparent 50%);
}

/* Decorative birds */
.deco-bird{
  position:fixed;pointer-events:none;z-index:1;
  font-size:clamp(40px,6vw,90px);
  opacity:.85;filter:drop-shadow(2px 4px 8px rgba(0,0,0,.2));
}
.deco-bird.left{left:-1%;top:12%;transform:scaleX(-1);}
.deco-bird.right{right:-1%;top:10%;}

/* Decorative flowers */
.deco-flower{
  position:fixed;pointer-events:none;z-index:1;
  font-size:clamp(50px,8vw,110px);opacity:.9;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.2));
}
.deco-flower.fl{bottom:0;left:-1%;}
.deco-flower.fr{bottom:0;right:-1%;}

/* Fairy lights */
#lights{position:fixed;top:0;left:0;right:0;height:48px;z-index:10;pointer-events:none;}
.wire{position:absolute;top:14px;left:-5px;right:-5px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(80,40,20,.6) 8%,rgba(60,30,10,.7) 92%,transparent);}
.bulb{position:absolute;width:9px;height:11px;border-radius:50% 50% 42% 42%;top:10px;
  transform:translateX(-50%);animation:blink var(--d,2s) ease-in-out infinite var(--dl,0s);
  box-shadow:0 0 8px var(--c),0 0 18px var(--c);}
.bulb::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;background:rgba(60,30,10,.8);border-radius:2px 2px 0 0;}
@keyframes blink{0%,100%{opacity:.3;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.2);}}

/* Header */
#header{
  position:relative;z-index:10;text-align:center;
  padding:64px 20px 12px;
}
#header h1{
  font-family:'Dancing Script',cursive;
  font-size:clamp(40px,8vw,80px);
  color:#fff;
  font-weight:700;
  text-shadow:0 2px 20px rgba(180,40,80,.6),0 0 60px rgba(255,150,180,.4);
  line-height:1.1;
}
#header h1 em{color:#ffd0e0;font-style:italic;}
.sub{
  margin-top:4px;
  font-size:clamp(10px,1.8vw,13px);
  color:rgba(255,220,230,.7);
  letter-spacing:3px;text-transform:uppercase;
}
.instr{
  display:inline-block;margin-top:10px;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  backdrop-filter:blur(8px);
  border-radius:99px;padding:8px 22px;
  font-size:clamp(11px,2vw,14px);color:#fff;letter-spacing:.5px;
  text-shadow:0 1px 4px rgba(0,0,0,.2);
}
#prog{margin-top:8px;font-size:12px;color:rgba(255,220,230,.6);}
#prog span{color:#fff;font-weight:700;}

/* ── WALL ── */
#wall{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:8px 20px 80px;}

.cl-row{position:relative;margin-bottom:44px;}
.cl-row::before{content:'';position:absolute;top:6px;left:-8px;right:-8px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(80,30,10,.5) 8%,rgba(60,20,8,.65) 92%,transparent);}
.row-cards{display:grid;grid-template-columns:repeat(var(--cols,7),1fr);gap:12px;padding-top:20px;}

/* ── CARD ── */
.cw{position:relative;cursor:pointer;transition:transform .25s ease;}
.cw:hover{transform:translateY(-6px) scale(1.05);}
.cw:hover .card{box-shadow:0 12px 40px rgba(200,60,80,.5),0 4px 12px rgba(0,0,0,.4);}

/* Clothespin */
.cw::before{content:'';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  width:8px;height:16px;background:linear-gradient(180deg,#9b7520,#6b4f10);
  border-radius:3px 3px 2px 2px;box-shadow:1px 1px 3px rgba(0,0,0,.5);z-index:5;}
.cw::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  width:12px;height:4px;background:#b08828;border-radius:3px;z-index:6;}

.card{
  width:100%;border-radius:10px;overflow:hidden;
  box-shadow:3px 5px 20px rgba(0,0,0,.4);
  border:2px solid rgba(255,220,180,.5);
  animation:sway var(--sw,3s) ease-in-out infinite var(--sd,0s);
  transform-origin:top center;
  display:flex;flex-direction:column;
  min-height:140px;
  background:linear-gradient(160deg,var(--c1,#fff8f0),var(--c2,#ffecd8));
}
@keyframes sway{0%,100%{transform:rotate(var(--ra,-3deg));}50%{transform:rotate(var(--rb,3deg));}}
.cw:hover .card{animation:none;}

.card-photo{display:none;}

.card-label{
  flex:1;padding:14px 10px 12px;
  text-align:center;
  display:flex;flex-direction:column;gap:6px;align-items:center;justify-content:center;
}
.card-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(16px,1.4vw,22px);
  font-weight:700;color:#6b1a2a;line-height:1.2;
}
.card-zodiac{
  font-size:clamp(9px,.85vw,11px);color:#8b3a4a;font-weight:700;
  background:rgba(200,80,100,.12);
  border:1px solid rgba(200,80,100,.25);
  border-radius:99px;padding:2px 9px;white-space:nowrap;
}
.card-tap{
  font-size:9px;color:#a05060;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;
  animation:tapP 1.4s ease-in-out infinite;
}
@keyframes tapP{0%,100%{opacity:.5;}50%{opacity:1;}}
.cw.opened .card{border-color:rgba(200,80,100,.4);}
.cw.opened .card-label{background:linear-gradient(160deg,#ffe8f0,#ffd8e8);}

/* ════════════════════════════════════════════════
   MODAL — 3 SLIDES
════════════════════════════════════════════════ */
#modal{
  position:fixed;inset:0;z-index:5000;
  background:rgba(5,2,14,0);backdrop-filter:blur(0px);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  transition:background .35s ease,backdrop-filter .35s ease;
  padding:12px;
}
#modal.show{background:rgba(5,2,14,.88);backdrop-filter:blur(22px);pointer-events:all;}

.mc{
  width:min(94vw,400px);
  max-height:94vh;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 0 80px rgba(200,80,120,.5),0 24px 60px rgba(0,0,0,.7);
  transform:scale(.72) translateY(50px);opacity:0;
  transition:transform .45s cubic-bezier(.34,1.5,.64,1),opacity .35s ease;
  position:relative;display:flex;flex-direction:column;
}
#modal.show .mc{transform:scale(1) translateY(0);opacity:1;}

/* Slide track */
.mc-slides{display:flex;width:300%;flex:1;min-height:0;
  transition:transform .42s cubic-bezier(.4,0,.2,1);}
.mc-slide{width:33.333%;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}

/* Close */
.mc-close{
  position:absolute;top:10px;right:10px;z-index:20;
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,.2);border:none;
  color:#fff;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;backdrop-filter:blur(4px);
}
.mc-close:hover{background:rgba(0,0,0,.4);transform:rotate(90deg);}

/* SLIDE 1 — Photo + Message */
.mc-photo{
  width:100%;aspect-ratio:3/4;flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#fde8f0,#f9c8dc);
  max-height:50vh;
}
.mc-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center center;display:block;}
.mc-photo .mcp-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:64px;}

.mc-info{
  flex:1;padding:18px 20px 14px;
  display:flex;flex-direction:column;gap:9px;overflow:hidden;
  background:linear-gradient(160deg,#fff8fc,#ffeef5);
  position:relative;
}
.mc-info::after{content:'✿';position:absolute;bottom:-8px;right:12px;
  font-size:70px;color:rgba(200,80,120,.06);pointer-events:none;}
.mc-date{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#d09090;font-weight:600;}
.mc-name{font-family:'Dancing Script',cursive;font-size:clamp(26px,6vw,36px);font-weight:700;color:#6b1a2a;line-height:1.1;}
.mc-div{width:40px;height:3px;background:linear-gradient(90deg,#e84070,#ff9090);border-radius:99px;}
.mc-msg{font-size:clamp(12px,2.5vw,14px);color:#7a2035;line-height:1.7;font-style:italic;}
.mc-fl{font-size:20px;}

/* SLIDE 2 — Quote */
.mc-quote-slide{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px 48px;
  background:linear-gradient(160deg,#0d0820,#1a0838,#0d0820);
  position:relative;overflow:hidden;gap:16px;text-align:center;
}
.mc-quote-slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 25% 35%,rgba(200,80,140,.25) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 65%,rgba(200,60,80,.18) 0%,transparent 55%);
}
.q-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:rgba(255,180,200,.45);font-weight:700;position:relative;z-index:1;}
.q-emoji-big{font-size:36px;position:relative;z-index:1;animation:floatE 3s ease-in-out infinite;}
@keyframes floatE{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.q-open,.q-close-quote{font-size:52px;color:rgba(200,100,140,.2);line-height:0;
  position:relative;z-index:1;}
.q-open{align-self:flex-start;margin-bottom:-8px;}
.q-close-quote{align-self:flex-end;margin-top:-8px;}
.q-text{font-size:clamp(13px,3vw,16px);color:#e8d5f0;line-height:1.85;
  font-style:italic;position:relative;z-index:1;max-width:300px;}
.q-name{font-family:'Dancing Script',cursive;font-size:20px;font-weight:700;
  color:#e090b0;position:relative;z-index:1;}
.q-star{position:absolute;border-radius:50%;background:#fff;pointer-events:none;
  animation:twk var(--d,2s) ease-in-out infinite var(--dl,0s);}
@keyframes twk{0%,100%{opacity:.07;}50%{opacity:.6;}}

/* SLIDE 3 — Gift */
.mc-gift-slide{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:28px 22px 48px;gap:16px;
  background:linear-gradient(160deg,#fff0f5,#ffe0ee,#fff8fc);
  position:relative;overflow:hidden;text-align:center;
}
.mc-gift-slide::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 20%,rgba(220,100,140,.12) 0%,transparent 60%);
}
.gift-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;
  color:rgba(180,80,100,.5);font-weight:700;position:relative;z-index:1;}
.gift-photo{
  width:min(75%,200px);
  aspect-ratio:1/1;
  border-radius:16px;
  overflow:hidden;
  position:relative;z-index:1;
  background:linear-gradient(135deg,#fde8f0,#f9c8dc);
  box-shadow:0 8px 24px rgba(200,60,100,.2);
  border:2px solid rgba(220,100,140,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;
}
.gift-photo img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.gift-name-label{font-size:10px;letter-spacing:2px;color:rgba(160,60,80,.6);text-transform:uppercase;position:relative;z-index:1;font-weight:600;}
.gift-item-name{
  font-family:'Dancing Script',cursive;
  font-size:clamp(22px,5vw,30px);font-weight:700;color:#7a1a30;
  position:relative;z-index:1;line-height:1.2;
}
.gift-person{font-family:'Dancing Script',cursive;font-size:16px;color:#b06070;position:relative;z-index:1;}
/* Sparkles in gift slide */
.g-spark{position:absolute;pointer-events:none;font-size:12px;
  animation:sparkle var(--d,2s) ease-in-out infinite var(--dl,0s);opacity:0;}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:.8;transform:scale(1.2);}}

/* ── DOTS ── */
.mc-bottom{
  position:absolute;bottom:0;left:0;right:0;height:38px;
  display:flex;align-items:center;justify-content:center;gap:8px;z-index:15;
  background:linear-gradient(transparent,rgba(0,0,0,.06));pointer-events:none;
}
.mc-dot{width:9px;height:9px;border-radius:50%;
  background:rgba(200,80,120,.2);border:2px solid rgba(200,80,120,.35);
  transition:all .35s cubic-bezier(.4,0,.2,1);cursor:pointer;pointer-events:all;padding:0;}
.mc-dot.active{width:26px;border-radius:99px;
  background:linear-gradient(90deg,#e84070,#ff8090);border-color:transparent;
  box-shadow:0 0 8px rgba(220,60,90,.5);}

/* Swipe hint */
.swipe-arrow{
  position:absolute;bottom:10px;right:14px;
  display:flex;align-items:center;gap:4px;
  z-index:16;pointer-events:none;opacity:1;transition:opacity .3s;
}
.swipe-arrow span{font-size:9px;letter-spacing:1.5px;color:rgba(200,80,120,.5);
  font-weight:700;text-transform:uppercase;}
.arrow-icon{font-size:12px;color:rgba(220,100,140,.6);
  animation:arrowB 1.4s ease-in-out 1.2s 5;}
@keyframes arrowB{0%,100%{transform:translateX(0);opacity:.6;}50%{transform:translateX(5px);opacity:1;}}

/* ════════════════════════════════════════════════
   CONFETTI + DONE
════════════════════════════════════════════════ */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:6000;}

#done{display:none;position:fixed;inset:0;z-index:7000;
  background:rgba(5,2,14,.92);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:20px;}
#done.show{display:flex;animation:fi .8s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
#done h2{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,52px);
  color:#fde8f0;text-shadow:0 0 40px rgba(220,100,140,.6);}
#done h2 em{color:#ffb0c8;}
#done p{font-size:14px;color:#d090a8;letter-spacing:2px;}
#done button{margin-top:8px;padding:12px 32px;
  background:linear-gradient(135deg,#e84070,#ff9090);border:none;border-radius:99px;
  color:#fff;font-size:14px;font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:1px;transition:transform .2s;}
#done button:hover{transform:scale(1.06);}

/* ════════════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════════════ */
@media(max-width:480px){
  #header{padding:54px 14px 10px;}
  #header h1{font-size:36px;}
  .sub{font-size:9px;letter-spacing:2px;}
  .instr{font-size:11px;padding:7px 14px;}
  #wall{padding:6px 10px 60px;}
  .cl-row{margin-bottom:32px;}
  .row-cards{grid-template-columns:repeat(4,1fr)!important;gap:8px;padding-top:16px;}
  .card{min-height:90px;border-radius:7px;}
  .card-label{padding:9px 5px 9px;gap:4px;}
  .card-name{font-size:13px;}
  .card-zodiac{font-size:8px;padding:2px 6px;}
  .card-tap{font-size:8px;}
  .cw::before{width:6px;height:13px;top:-10px;}
  .cw::after{width:10px;height:4px;top:-4px;}
  .deco-bird{font-size:36px;}
  .deco-flower{font-size:44px;}
}
@media(min-width:481px) and (max-width:768px){
  #header h1{font-size:44px;}
  #wall{padding:8px 14px 70px;}
  .row-cards{grid-template-columns:repeat(4,1fr)!important;gap:10px;}
  .card{min-height:110px;}

  { name:"Hoàng Uyên",    fullname:"Trần Nguyễn Hoàng Uyên",   zodiac:"Xử Nữ",      photo:"photos/HoangUyen.JPG",  msg:"Chúc bạn luôn chu đáo và tinh tế, như người luôn biết cách khiến những điều nhỏ bé trở nên đặc biệt.",                                           quote:"Nếu hôm nay bạn lại học đến khuya, mong rằng bạn cũng sẽ nhớ nhìn ra ngoài cửa sổ một chút. Thế giới vẫn rất rộng lớn và bình yên.",                                                                                  gift:"Vinamilk Chuối",     gift_photo:"" },
  { name:"Phi Yến",       fullname:"Lương Phi Yến",            zodiac:"Bảo Bình",   photo:"photos/PhiYen.JPG",     msg:"Chúc bạn luôn tự do như cánh chim trên bầu trời rộng lớn, mang theo những suy nghĩ độc đáo và những ước mơ bay xa.",                             quote:"Bạn không cần phải hoàn hảo để trở nên đáng quý. Chỉ cần bạn là chính mình.",                                                                                                                                         gift:"Metis Nho",          gift_photo:"" },
];

const ROWS = [7, 7, 7, 7];
const COLORS = [
  ['#fff5f0','#ffe8d6'],['#fff0f5','#ffd6e8'],['#f5f0ff','#e8d6ff'],
  ['#f0fff5','#d6ffe8'],['#fffff0','#fff5d6'],['#f0f8ff','#d6eeff'],
  ['#fff8f0','#ffecd6'],['#fdf0ff','#f5d6ff'],
];

/* ─── INTRO ─── */
function openEnvelope() {
  const env = document.getElementById('env');
  const hint = document.getElementById('env-hint');
  if (env.classList.contains('open')) return;
  env.classList.add('open');
  hint.style.opacity = '0';
  setTimeout(() => {
    document.getElementById('letter-box').style.display = 'block';
    env.style.display = 'none';
    hint.style.display = 'none';
  }, 700);
}



/* ─── WALL ─── */
function initWall() {
  // Fairy lights
  const lightsEl = document.getElementById('lights');
  const BC = ['#ff6b6b','#ffd166','#06d6a0','#a855f7','#ec4899','#feca57','#48dbfb','#f4a261'];
  for (let i = 2; i <= 98; i += 4) {
    const b = document.createElement('div'); b.className = 'bulb';
    const c = BC[Math.floor(Math.random()*BC.length)];
    b.style.cssText = `left:${i}%;background:${c};--c:${c};--d:${1.5+Math.random()*2.5}s;--dl:${Math.random()*3}s;`;
    lightsEl.appendChild(b);
  }

  document.getElementById('tc').textContent = PEOPLE.length;
  const wall = document.getElementById('wall');
  let openedCount = 0, gi = 0;

  ROWS.forEach(count => {
    const row = document.createElement('div'); row.className = 'cl-row';
    const rc  = document.createElement('div'); rc.className  = 'row-cards';
    rc.style.setProperty('--cols', count);

    for (let i = 0; i < count && gi < PEOPLE.length; i++, gi++) {
      const g    = PEOPLE[gi];
      const cols = COLORS[gi % COLORS.length];
      const ra   = (Math.random()-.5)*6;
      const rb   = (Math.random()-.5)*6;

      const cw = document.createElement('div'); cw.className = 'cw';
      const card = document.createElement('div'); card.className = 'card';
      card.style.cssText = `--ra:${ra}deg;--rb:${rb}deg;--sw:${2.8+Math.random()*2.2}s;--sd:${Math.random()*4}s;--c1:${cols[0]};--c2:${cols[1]};`;

      const lbl = document.createElement('div'); lbl.className = 'card-label';
      lbl.innerHTML = `
        <div class="card-name">${g.name}</div>
        <div class="card-zodiac">${g.zodiac}</div>
        <div class="card-tap">Mở lời chúc</div>
      `;
      card.appendChild(lbl);
      cw.appendChild(card); rc.appendChild(cw);

      cw.addEventListener('click', () => {
        if (!cw.classList.contains('opened')) {
          cw.classList.add('opened');
          openedCount++;
          document.getElementById('fc').textContent = openedCount;
          fireConfetti(cw);
          if (openedCount >= PEOPLE.length) setTimeout(() => { document.getElementById('done').classList.add('show'); bigConfetti(); }, 1000);
        }
        openModal(g, cols);
      });
    }
    row.appendChild(rc); wall.appendChild(row);
  });

  // Stars in quote slide
  const qSlide = document.getElementById('mc-quote-slide');
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div'); s.className = 'q-star';
    const sz = Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3}s;--dl:${Math.random()*4}s;`;
    qSlide.appendChild(s);
  }
  // Sparkles in gift slide
  const gSlide = document.getElementById('mc-gift-slide');
  const sparkles = ['✨','💫','🌟','⭐','💝'];
  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div'); s.className = 'g-spark';
    s.textContent = sparkles[Math.floor(Math.random()*sparkles.length)];
    s.style.cssText=`left:${Math.random()*90+5}%;top:${Math.random()*80+5}%;--d:${1.5+Math.random()*2}s;--dl:${Math.random()*3}s;`;
    gSlide.appendChild(s);
  }
}

/* ─── MODAL ─── */
const modal    = document.getElementById('modal');
const mcImg    = document.getElementById('mcp-img');
const mcPh     = document.getElementById('mcp-ph');
const mcSlides = document.getElementById('mc-slides');
const dots     = document.querySelectorAll('.mc-dot');
const swipeArr = document.getElementById('swipe-arrow');
let curSlide   = 0;

function goSlide(n) {
  curSlide = n;
  mcSlides.style.transform = `translateX(-${n * 33.333}%)`;
  dots.forEach((d,i) => d.classList.toggle('active', i===n));
  swipeArr.style.opacity = n < 2 ? '1' : '0';
}

let tx = 0;
mcSlides.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
mcSlides.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 35) goSlide(Math.max(0, Math.min(2, curSlide + (dx < 0 ? 1 : -1))));
});
let mx = 0, drag = false;
mcSlides.addEventListener('mousedown', e => { mx = e.clientX; drag = true; e.preventDefault(); });
window.addEventListener('mouseup', e => {
  if (!drag) return; drag = false;
  const dx = e.clientX - mx;
  if (Math.abs(dx) > 35) goSlide(Math.max(0, Math.min(2, curSlide + (dx < 0 ? 1 : -1))));
});

function openModal(g, cols) {
  goSlide(0);

  // Slide 1
  document.getElementById('mc-name').textContent = g.name;
  document.getElementById('mc-msg').textContent  = g.msg;
  document.getElementById('mc-fl').textContent   = '🌸';
  document.getElementById('mc-photo').style.background = `linear-gradient(135deg,${cols[0]},${cols[1]})`;
  if (g.photo) {
    mcImg.src = g.photo; mcImg.style.display = 'block'; mcPh.style.display = 'none';
    mcImg.onerror = () => { mcImg.style.display='none'; mcPh.style.display='flex'; mcPh.textContent='🌸'; };
  } else {
    mcImg.style.display='none'; mcPh.style.display='flex'; mcPh.textContent='🌸';
  }

  // Slide 2
  document.getElementById('q-text').textContent  = g.quote || '';
  document.getElementById('q-name').textContent  = '— ' + g.name;
  document.getElementById('q-emoji').textContent = '🌸';

  // Slide 3
  document.getElementById('gift-item').textContent   = g.gift || 'Bí mật...';
  document.getElementById('gift-person').textContent = '— ' + g.name;
  const gImg = document.getElementById('gift-img');
  const gPh  = document.getElementById('gift-ph-emoji');
  if (g.gift_photo) {
    gImg.src = g.gift_photo; gImg.style.display='block'; gPh.style.display='none';
    gImg.onerror = () => { gImg.style.display='none'; gPh.style.display='flex'; };
  } else {
    gImg.style.display='none'; gPh.style.display='flex'; gPh.textContent='🎁';
  }

  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { mcImg.src=''; }, 400);
}

document.getElementById('mc-close').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target===modal) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeModal();
  if (e.key==='ArrowRight') goSlide(Math.min(2, curSlide+1));
  if (e.key==='ArrowLeft')  goSlide(Math.max(0, curSlide-1));
});

/* ─── CONFETTI ─── */
const cv = document.getElementById('confetti'), ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width=window.innerWidth; cv.height=window.innerHeight; });
let parts = [];
const CC = ['#e84070','#ff9090','#f4a261','#fde68a','#f9a8d4','#fff','#c084fc','#fca5a5'];

function spawnParts(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, s = 3+Math.random()*7;
    parts.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      sz:4+Math.random()*6, color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.014+Math.random()*.01, rot:Math.random()*360,
      rv:(Math.random()-.5)*12, rect:Math.random()>.4});
  }
}
function fireConfetti(el) {
  const r = el.getBoundingClientRect();
  spawnParts(r.left+r.width/2, r.top+r.height/2, 60);
}
function bigConfetti() {
  for (let i=0;i<280;i++)
    parts.push({x:Math.random()*cv.width, y:-10, vx:(Math.random()-.5)*5,
      vy:2+Math.random()*6, sz:5+Math.random()*8,
      color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.004+Math.random()*.006, rot:Math.random()*360,
      rv:(Math.random()-.5)*9, rect:Math.random()>.4});
}
(function loop() {
  ctx.clearRect(0,0,cv.width,cv.height);
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.vx*=.99;
    p.life-=p.decay; p.rot+=p.rv;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    if(p.rect) ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
    else{ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  requestAnimationFrame(loop);
})();
initWall();
</script>
