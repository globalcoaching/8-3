<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨ 8/3 — Tìm tên của bạn!</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Be+Vietnam+Pro:ital,wght@0,400;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#0a0612;font-family:'Be Vietnam Pro',sans-serif;overflow-x:hidden;}

/* BG */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 20%,rgba(168,85,247,.14) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 80%,rgba(236,72,153,.10) 0%,transparent 55%),#0a0612;}

/* LOADING */
#loading{position:fixed;inset:0;z-index:9999;background:#0a0612;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .9s ease,visibility .9s ease;}
#loading.out{opacity:0;visibility:hidden;pointer-events:none;}
.li{font-size:52px;animation:bob 1.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.lt{font-family:'DM Serif Display',serif;font-size:clamp(20px,4vw,38px);color:#e2d9f3;letter-spacing:2px;text-align:center;}
.lt em{color:#c084fc;font-style:italic;}
.ls{font-size:12px;color:#6b5a8a;letter-spacing:3px;}
.lb{width:220px;height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;}
.lf{height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#a855f7,#ec4899,#a855f7);background-size:200%;animation:bsh 1.5s linear infinite;transition:width .1s;}
@keyframes bsh{0%{background-position:200%;}100%{background-position:-200%;}}
.lp{font-size:12px;color:#6b5a8a;}

/* FAIRY LIGHTS */
#lights{position:fixed;top:0;left:0;right:0;height:48px;z-index:10;pointer-events:none;}
.wire{position:absolute;top:14px;left:-5px;right:-5px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(60,40,80,.7) 8%,rgba(50,35,70,.8) 92%,transparent);}
.bulb{position:absolute;width:9px;height:11px;border-radius:50% 50% 42% 42%;top:10px;
  transform:translateX(-50%);animation:blink var(--d,2s) ease-in-out infinite var(--dl,0s);
  box-shadow:0 0 8px var(--c),0 0 16px var(--c);}
.bulb::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);
  width:4px;height:5px;background:rgba(60,40,80,.9);border-radius:2px 2px 0 0;}
@keyframes blink{0%,100%{opacity:.35;transform:translateX(-50%) scale(1);}50%{opacity:1;transform:translateX(-50%) scale(1.2);}}

/* HEADER */
#header{position:relative;z-index:10;text-align:center;padding:60px 20px 16px;}
#header h1{font-family:'DM Serif Display',serif;font-size:clamp(24px,4.5vw,52px);
  color:#e2d9f3;letter-spacing:3px;text-shadow:0 0 40px rgba(192,132,252,.5);
  animation:glow 3s ease-in-out infinite;}
#header h1 em{color:#c084fc;font-style:italic;}
@keyframes glow{0%,100%{text-shadow:0 0 30px rgba(192,132,252,.4);}50%{text-shadow:0 0 60px rgba(192,132,252,.8),0 0 100px rgba(236,72,153,.3);}}
.sub{margin-top:8px;font-size:13px;color:#6b5a8a;letter-spacing:3px;text-transform:uppercase;}
.instr{display:inline-block;margin-top:12px;background:rgba(168,85,247,.1);
  border:1px solid rgba(168,85,247,.25);border-radius:99px;padding:8px 22px;
  font-size:13px;color:#b084d4;letter-spacing:1px;}
#prog{margin-top:10px;font-size:13px;color:#4a3568;}
#prog span{color:#c084fc;font-weight:700;}

/* WALL */
#wall{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:10px 28px 80px;}
.cl-row{position:relative;margin-bottom:52px;}
.cl-row::before{content:'';position:absolute;top:6px;left:-8px;right:-8px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(100,70,140,.6) 8%,rgba(80,55,110,.75) 92%,transparent);}
.row-cards{display:grid;grid-template-columns:repeat(var(--cols,9),1fr);gap:14px;padding-top:22px;}

/* CARD */
.cw{position:relative;cursor:pointer;transition:transform .25s ease;}
.cw:hover{transform:translateY(-6px) scale(1.05);}
.cw:hover .card{box-shadow:0 12px 40px rgba(168,85,247,.5),0 4px 12px rgba(0,0,0,.5);}

/* Clothespin */
.cw::before{content:'';position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  width:9px;height:18px;background:linear-gradient(180deg,#9b7520,#6b4f10);
  border-radius:3px 3px 2px 2px;box-shadow:1px 1px 3px rgba(0,0,0,.5);z-index:5;}
.cw::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  width:13px;height:5px;background:#b08828;border-radius:3px;z-index:6;}

.card{width:100%;border-radius:8px;overflow:hidden;
  box-shadow:2px 4px 20px rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.12);
  animation:sway var(--sw,3s) ease-in-out infinite var(--sd,0s);
  transform-origin:top center;display:flex;flex-direction:column;min-height:155px;}
@keyframes sway{0%,100%{transform:rotate(var(--ra,-3deg));}50%{transform:rotate(var(--rb,3deg));}}
.cw:hover .card{animation:none;}

/* Photo hidden on wall — only shows in modal */
.card-photo{display:none;}

.card-label{
  flex:1;padding:16px 10px 14px;text-align:center;
  background:linear-gradient(160deg,var(--c1,#f3e8ff),var(--c2,#fce7f3));
  display:flex;flex-direction:column;gap:7px;align-items:center;justify-content:center;
}
.card-emoji{font-size:26px;line-height:1;}
.card-name{font-family:'Dancing Script',cursive;font-size:clamp(17px,1.5vw,24px);
  font-weight:700;color:#3b0764;line-height:1.2;}
.card-zodiac{font-size:clamp(9px,.85vw,12px);color:#7c3aed;font-weight:700;
  background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);
  border-radius:99px;padding:3px 9px;white-space:nowrap;}
.card-tap{font-size:10px;color:#b094d4;font-weight:600;letter-spacing:.5px;
  animation:tapP 1.2s ease-in-out infinite;}
@keyframes tapP{0%,100%{opacity:.5;}50%{opacity:1;}}

.cw.opened .card-label{background:linear-gradient(160deg,#ede9fe,#fce7f3);}
.cw.opened .card{border-color:rgba(192,132,252,.4);}

/* MODAL */
#modal{position:fixed;inset:0;z-index:5000;
  background:rgba(5,2,14,0);backdrop-filter:blur(0px);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;transition:background .35s ease,backdrop-filter .35s ease;}
#modal.show{background:rgba(5,2,14,.88);backdrop-filter:blur(20px);pointer-events:all;}

.mc{display:flex;background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 0 80px rgba(168,85,247,.4),0 20px 60px rgba(0,0,0,.6);
  width:min(88vw,680px);max-height:90vh;
  transform:scale(.72) translateY(40px);opacity:0;
  transition:transform .42s cubic-bezier(.34,1.56,.64,1),opacity .35s ease;}
#modal.show .mc{transform:scale(1) translateY(0);opacity:1;}

/* Modal left: photo */
.mc-photo{width:52%;flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#e9d5ff,#ddd6fe);}
.mc-photo img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;}
.mc-photo .mcp-ph{width:100%;height:100%;min-height:300px;
  display:flex;align-items:center;justify-content:center;font-size:80px;}

/* Modal right: info */
.mc-info{flex:1;padding:32px 24px 28px;display:flex;flex-direction:column;
  justify-content:center;gap:14px;position:relative;overflow:hidden;
  background:linear-gradient(160deg,#faf5ff 0%,#fce7f3 100%);}
.mc-info::before{content:'✦';position:absolute;top:12px;right:16px;
  font-size:70px;color:rgba(168,85,247,.06);}
.mc-date{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#c4b5fd;font-weight:600;}
.mc-name{font-family:'Dancing Script',cursive;font-size:clamp(30px,3.5vw,50px);
  font-weight:700;color:#3b0764;line-height:1.1;}
.mc-div{width:44px;height:3px;background:linear-gradient(90deg,#a855f7,#ec4899);border-radius:99px;}
.mc-msg{font-size:clamp(13px,1.3vw,16px);color:#5b2d8e;line-height:1.75;
  font-style:italic;font-weight:400;}
.mc-fl{font-size:26px;margin-top:4px;}
.mc-close{position:absolute;top:14px;right:14px;width:32px;height:32px;
  border-radius:50%;background:rgba(168,85,247,.12);border:none;
  color:#a855f7;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;}
.mc-close:hover{background:rgba(168,85,247,.25);transform:rotate(90deg);}

/* CONFETTI */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:6000;}

/* DONE */
#done{display:none;position:fixed;inset:0;z-index:7000;
  background:rgba(5,2,14,.9);backdrop-filter:blur(20px);
  align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;}
#done.show{display:flex;animation:fi .8s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
#done h2{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,52px);
  color:#e2d9f3;text-shadow:0 0 40px rgba(192,132,252,.6);}
#done h2 em{color:#c084fc;}
#done p{font-size:15px;color:#9061c2;letter-spacing:2px;}
#done button{margin-top:8px;padding:12px 32px;
  background:linear-gradient(135deg,#a855f7,#ec4899);border:none;border-radius:99px;
  color:#fff;font-size:14px;font-family:'Be Vietnam Pro',sans-serif;font-weight:700;
  cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(168,85,247,.4);
  transition:transform .2s;}
#done button:hover{transform:scale(1.06);}

/* HINT */
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);
  border-radius:99px;padding:9px 22px;font-size:11px;color:rgba(192,132,252,.65);
  letter-spacing:2px;z-index:100;backdrop-filter:blur(8px);pointer-events:none;
  animation:hf 6s ease 2s forwards;opacity:0;}
@keyframes hf{0%{opacity:0;transform:translateX(-50%) translateY(8px);}15%{opacity:1;transform:translateX(-50%) translateY(0);}80%{opacity:1;}100%{opacity:0;}}

@media(max-width:640px){
  .mc{flex-direction:column;width:92vw;max-height:95vh;}
  .mc-photo{width:100%;height:50vw;flex-shrink:0;}
  .mc-info{padding:18px 18px 22px;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="li">🌸</div>
  <h2 class="lt">Chuẩn bị <em>bất ngờ</em>...</h2>
  <p class="ls">Happy Women's Day 8/3</p>
  <div class="lb"><div class="lf" id="lbar"></div></div>
  <p class="lp" id="lpct">0%</p>
</div>

<div id="lights"><div class="wire"></div></div>

<div id="header">
  <h1>Tìm <em>tên của bạn</em> 🔍</h1>
  <p class="sub">8 tháng 3 · Ngày của những nàng ✨</p>
  <p class="instr">👆 Bấm vào tấm có tên bạn để mở bất ngờ!</p>
  <p id="prog">Đã mở <span id="fc">0</span> / <span id="tc">27</span> tấm</p>
</div>

<div id="wall"></div>

<!-- MODAL -->
<div id="modal">
  <div class="mc">
    <div class="mc-photo" id="mc-photo">
      <div class="mcp-ph" id="mcp-ph">🌸</div>
      <img id="mcp-img" src="" alt="" style="display:none"/>
    </div>
    <div class="mc-info">
      <button class="mc-close" id="mc-close">✕</button>
      <p class="mc-date">Happy 8/3 · 2025</p>
      <h2 class="mc-name" id="mc-name"></h2>
      <div class="mc-div"></div>
      <p class="mc-msg" id="mc-msg"></p>
      <div class="mc-fl" id="mc-fl">🌸</div>
    </div>
  </div>
</div>

<canvas id="confetti"></canvas>

<div id="done">
  <div style="font-size:60px">🎉</div>
  <h2>Chúc mừng <em>8/3</em>!</h2>
  <p>✨ Yêu tất cả các bạn rất nhiều ✨</p>
  <button onclick="document.getElementById('done').classList.remove('show')">Xem lại →</button>
</div>

<p id="hint">👆 BẤM VÀO TẤM CÓ TÊN CỦA BẠN NHÉ!</p>

<script>
/* ════════════════════════════════════════════════════
   SỬA TÊN + ẢNH + LỜI CHÚC Ở ĐÂY
   Ảnh đặt trong thư mục photos/ cùng chỗ với file HTML
════════════════════════════════════════════════════ */
const TEST_PHOTO = "photos/Vu.jpg"; // ← ảnh test dùng chung

const GIRLS = [
  { name:"Linh",   photo:TEST_PHOTO, msg:"Nụ cười của Linh làm sáng cả team! ☀️",    emoji:"🌸", zodiac:"♓ Song Ngư"    },
  { name:"Hương",  photo:TEST_PHOTO, msg:"Dịu dàng và ấm áp vô cùng 🌸",             emoji:"🌺", zodiac:"♉ Kim Ngưu"    },
  { name:"Ngân",   photo:TEST_PHOTO, msg:"Năng lượng tích cực số 1! ⚡",              emoji:"✨", zodiac:"♊ Song Tử"     },
  { name:"Thảo",   photo:TEST_PHOTO, msg:"Luôn truyền cảm hứng cho mọi người 🎨",    emoji:"🌻", zodiac:"♍ Xử Nữ"      },
  { name:"Vy",     photo:TEST_PHOTO, msg:"Đáng yêu nhất team không cần bàn cãi 🐣",  emoji:"🦋", zodiac:"♋ Cự Giải"    },
  { name:"Phương", photo:TEST_PHOTO, msg:"Tài năng & xinh đẹp tuyệt vời 👑",         emoji:"🌷", zodiac:"♌ Sư Tử"      },
  { name:"Trang",  photo:TEST_PHOTO, msg:"Tiếng cười vang nhất hành lang 😄",         emoji:"🎀", zodiac:"♎ Thiên Bình"  },
  { name:"Mai",    photo:TEST_PHOTO, msg:"Chăm chỉ và ngọt ngào như tên 🌺",         emoji:"🌹", zodiac:"♈ Bạch Dương"  },
  { name:"Yến",    photo:TEST_PHOTO, msg:"Bay cao nhé, chim én của team! 🕊️",        emoji:"⭐", zodiac:"♑ Ma Kết"      },
  { name:"Lan",    photo:TEST_PHOTO, msg:"Thơm ngát như hoa Lan 🌷",                 emoji:"🌸", zodiac:"♒ Bảo Bình"   },
  { name:"Hà",     photo:TEST_PHOTO, msg:"Mạnh mẽ và rạng rỡ mỗi ngày 💪",          emoji:"💫", zodiac:"♏ Bọ Cạp"     },
  { name:"Dung",   photo:TEST_PHOTO, msg:"Cảm ơn vì luôn ở đây 🤍",                 emoji:"🤍", zodiac:"♍ Xử Nữ"      },
  { name:"Quỳnh",  photo:TEST_PHOTO, msg:"Cá tính riêng không ai sánh được 💫",      emoji:"🌙", zodiac:"♊ Song Tử"     },
  { name:"Nhung",  photo:TEST_PHOTO, msg:"Ấm áp như ánh nắng ban mai ☀️",            emoji:"☀️", zodiac:"♌ Sư Tử"      },
  { name:"Trinh",  photo:TEST_PHOTO, msg:"Giỏi giang hết phần người khác rồi! 🚀",   emoji:"🚀", zodiac:"♈ Bạch Dương"  },
  { name:"Châu",   photo:TEST_PHOTO, msg:"Lấp lánh như ngọc trai 🦪",               emoji:"💎", zodiac:"♋ Cự Giải"    },
  { name:"Nga",    photo:TEST_PHOTO, msg:"Ánh sáng và sức mạnh của team 💡",         emoji:"💡", zodiac:"♐ Nhân Mã"    },
  { name:"Thu",    photo:TEST_PHOTO, msg:"Mùa thu đẹp như chính bạn 🍂",             emoji:"🍀", zodiac:"♎ Thiên Bình"  },
  { name:"Nhi",    photo:TEST_PHOTO, msg:"Bé nhỏ mà tinh thần to lắm đó! ✨",        emoji:"🌟", zodiac:"♉ Kim Ngưu"    },
  { name:"Diễm",   photo:TEST_PHOTO, msg:"Diễm lệ như tên, không cần nói thêm 🌹",   emoji:"🌹", zodiac:"♓ Song Ngư"    },
  { name:"Hiền",   photo:TEST_PHOTO, msg:"Hiền lành và đáng tin nhất team 💙",        emoji:"💙", zodiac:"♑ Ma Kết"      },
  { name:"Trúc",   photo:TEST_PHOTO, msg:"Vững chãi và thẳng thắn như tre 🎋",       emoji:"🎋", zodiac:"♏ Bọ Cạp"     },
  { name:"Loan",   photo:TEST_PHOTO, msg:"Luôn tươi cười dù khó khăn 🌻",            emoji:"🌻", zodiac:"♒ Bảo Bình"   },
  { name:"Tuyết",  photo:TEST_PHOTO, msg:"Tinh khiết và rạng rỡ 🤍",                emoji:"❄️", zodiac:"♐ Nhân Mã"    },
  { name:"Bình",   photo:TEST_PHOTO, msg:"Bình yên và ổn định cho cả nhóm 🌊",       emoji:"🌊", zodiac:"♍ Xử Nữ"      },
  { name:"Chi",    photo:TEST_PHOTO, msg:"Khéo léo và tinh tế từng chi tiết nhỏ 🎀",  emoji:"🎀", zodiac:"♊ Song Tử"     },
  { name:"Ngọc",   photo:TEST_PHOTO, msg:"Quý giá như ngọc, team may mắn có bạn 💎",  emoji:"💎", zodiac:"♌ Sư Tử"      },
];

const ROWS = [9, 9, 9];
const COLORS = [
  ['#f3e8ff','#ede9fe'],['#fce7f3','#fbcfe8'],['#e0f2fe','#bae6fd'],
  ['#dcfce7','#bbf7d0'],['#fef9c3','#fde68a'],['#ffedd5','#fed7aa'],
  ['#f0fdf4','#d1fae5'],['#fdf4ff','#f5d0fe'],['#fff1f2','#fecdd3'],
];
/* ════════════════════════════════════════════════════ */

// Fairy lights
const lightsEl = document.getElementById('lights');
const BC = ['#ff6b6b','#ffd166','#06d6a0','#a855f7','#ec4899','#feca57','#48dbfb','#f4a261'];
for (let i = 2; i <= 98; i += 4) {
  const b = document.createElement('div'); b.className = 'bulb';
  const c = BC[Math.floor(Math.random()*BC.length)];
  b.style.cssText = `left:${i}%;background:${c};--c:${c};--d:${1.5+Math.random()*2.5}s;--dl:${Math.random()*3}s;`;
  lightsEl.appendChild(b);
}

// Build wall
document.getElementById('tc').textContent = GIRLS.length;
const wall = document.getElementById('wall');
let openedCount = 0, gi = 0;

ROWS.forEach(count => {
  const row = document.createElement('div'); row.className = 'cl-row';
  const rc  = document.createElement('div'); rc.className  = 'row-cards';
  rc.style.setProperty('--cols', count);

  for (let i = 0; i < count && gi < GIRLS.length; i++, gi++) {
    const g    = GIRLS[gi];
    const cols = COLORS[gi % COLORS.length];
    const ra   = (Math.random()-.5)*7;
    const rb   = (Math.random()-.5)*7;

    const cw = document.createElement('div'); cw.className = 'cw';
    const card = document.createElement('div'); card.className = 'card';
    card.style.cssText = `--ra:${ra}deg;--rb:${rb}deg;--sw:${2.8+Math.random()*2.2}s;--sd:${Math.random()*4}s;`;

    // Photo area
    const ph = document.createElement('div'); ph.className = 'card-photo';
    const ep = document.createElement('div'); ep.className = 'ep';
    ep.style.cssText = `--c1:${cols[0]};--c2:${cols[1]};`;
    ep.textContent = g.emoji || '🌸';
    ph.appendChild(ep);

    if (g.photo) {
      const img = document.createElement('img');
      img.alt = '';
      img.onload  = () => { ep.style.opacity = '0'; };
      img.onerror = () => { img.remove(); };
      img.src = g.photo;
      ph.appendChild(img);
    }

    // Label
    // Label — emoji + name + zodiac + tap
    const lbl = document.createElement('div'); lbl.className = 'card-label';
    lbl.style.setProperty('--c1', cols[0]);
    lbl.style.setProperty('--c2', cols[1]);
    lbl.innerHTML = `
      <div class="card-emoji">${g.emoji||'🌸'}</div>
      <div class="card-name">${g.name}</div>
      <div class="card-zodiac">${g.zodiac||'✨'}</div>
      <div class="card-tap">👆 Bấm vào đây!</div>
    `;

    card.appendChild(ph); card.appendChild(lbl);
    cw.appendChild(card); rc.appendChild(cw);

    cw.addEventListener('click', () => {
      if (!cw.classList.contains('opened')) {
        cw.classList.add('opened');
        openedCount++;
        document.getElementById('fc').textContent = openedCount;
        fireConfetti(cw);
        if (openedCount >= GIRLS.length) {
          setTimeout(() => { document.getElementById('done').classList.add('show'); bigConfetti(); }, 1000);
        }
      }
      openModal(g, cols);
    });
  }
  row.appendChild(rc); wall.appendChild(row);
});

// Modal
const modal  = document.getElementById('modal');
const mcImg  = document.getElementById('mcp-img');
const mcPh   = document.getElementById('mcp-ph');

function openModal(g, cols) {
  document.getElementById('mc-name').textContent = g.name;
  document.getElementById('mc-msg').textContent  = g.msg;
  document.getElementById('mc-fl').textContent   = g.emoji || '🌸';
  document.getElementById('mc-photo').style.background = `linear-gradient(135deg,${cols[0]},${cols[1]})`;

  if (g.photo) {
    mcImg.src = g.photo;
    mcImg.style.display = 'block';
    mcPh.style.display  = 'none';
    mcImg.onerror = () => { mcImg.style.display='none'; mcPh.style.display='flex'; mcPh.textContent = g.emoji||'🌸'; };
  } else {
    mcImg.style.display = 'none';
    mcPh.style.display  = 'flex';
    mcPh.textContent = g.emoji || '🌸';
  }

  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => { mcImg.src = ''; }, 400);
}

document.getElementById('mc-close').onclick = closeModal;
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Loading
let p = 0;
const bar = document.getElementById('lbar'), pct = document.getElementById('lpct');
const iv = setInterval(() => {
  p = Math.min(p + Math.random()*5 + 1, 100);
  bar.style.width = p+'%'; pct.textContent = Math.round(p)+'%';
  if (p >= 100) { clearInterval(iv); setTimeout(() => document.getElementById('loading').classList.add('out'), 400); }
}, 55);

// Confetti
const cv = document.getElementById('confetti'), ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width=window.innerWidth; cv.height=window.innerHeight; });
let parts = [];
const CC = ['#c084fc','#e879f9','#f4a261','#fde68a','#6ee7b7','#f9a8d4','#fff','#a5f3fc'];

function spawnParts(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, s = 3+Math.random()*7;
    parts.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
      sz:4+Math.random()*6, color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.014+Math.random()*.01, rot:Math.random()*360,
      rv:(Math.random()-.5)*12, rect:Math.random()>.4});
  }
}
function fireConfetti(el) {
  const r = el.getBoundingClientRect();
  spawnParts(r.left+r.width/2, r.top+r.height/2, 55);
}
function bigConfetti() {
  for (let i=0;i<250;i++)
    parts.push({x:Math.random()*cv.width, y:-10, vx:(Math.random()-.5)*5,
      vy:2+Math.random()*6, sz:5+Math.random()*8,
      color:CC[Math.floor(Math.random()*CC.length)],
      life:1, decay:.004+Math.random()*.006, rot:Math.random()*360,
      rv:(Math.random()-.5)*9, rect:Math.random()>.4});
}
(function loop() {
  ctx.clearRect(0,0,cv.width,cv.height);
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.18; p.vx*=.99;
    p.life-=p.decay; p.rot+=p.rv;
    ctx.save(); ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    if(p.rect) ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);
    else{ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  requestAnimationFrame(loop);
})();
</script>
